<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocatto | Pedido QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/qr.css">
</head>

<body>
    <main class="qr-shell container py-3 py-md-4">
        <section class="hero card border-0 shadow-sm mb-3">
            <div class="card-body p-3 p-md-4">
                <h1 class="h4 mb-2">Pedido desde tu mesa</h1>
                <p class="text-muted mb-2">Escaneaste el QR correctamente. Elige tus productos y envía tu pedido sin iniciar sesión.</p>
                <div id="mesaInfo" class="mesa-chip">Cargando mesa...</div>
            </div>
        </section>

        <section class="card border-0 shadow-sm mb-3">
            <div class="card-body p-3 p-md-4">
                <label class="form-label fw-semibold" for="clienteNombre">Tu nombre</label>
                <input id="clienteNombre" class="form-control" placeholder="Ej: Ana Morales">
            </div>
        </section>

        <section class="card border-0 shadow-sm mb-3">
            <div class="card-header bg-white border-0 pt-3 px-3 px-md-4">
                <h2 class="h5 m-0">Menú disponible</h2>
            </div>
            <div class="card-body p-3 p-md-4">
                <div id="menuGrid" class="row g-3"></div>
            </div>
        </section>

        <section class="card border-0 shadow-sm mb-3">
            <div class="card-header bg-white border-0 pt-3 px-3 px-md-4 d-flex justify-content-between align-items-center">
                <h2 class="h5 m-0">Tu pedido</h2>
                <span id="totalPedido" class="total-pill">$0.00</span>
            </div>
            <div class="card-body p-3 p-md-4">
                <div id="carritoVacio" class="text-muted">Aún no agregas productos.</div>
                <div id="carritoItems" class="d-grid gap-2"></div>
                <button id="btnEnviarPedido" class="btn btn-main w-100 mt-3">
                    <i class="bi bi-send"></i>
                    Enviar pedido
                </button>
            </div>
        </section>

        <section class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white border-0 pt-3 px-3 px-md-4">
                <h2 class="h5 m-0">Seguimiento</h2>
            </div>
            <div class="card-body p-3 p-md-4">
                <div class="row g-2 mb-3">
                    <div class="col-8">
                        <input id="codigoSeguimiento" class="form-control" placeholder="Código de seguimiento">
                    </div>
                    <div class="col-4">
                        <button id="btnSeguir" class="btn btn-outline-dark w-100">Seguir</button>
                    </div>
                </div>
                <div id="seguimientoPanel" class="d-none">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted">Estado actual</span>
                        <span id="estadoBadge" class="badge text-bg-secondary">PENDIENTE</span>
                    </div>
                    <div class="small text-muted" id="seguimientoDetalle"></div>
                </div>
                <div id="seguimientoVacio" class="text-muted">Ingresa tu código para consultar el estado.</div>
            </div>
        </section>
    </main>

    <script type="module" src="assets/js/qr-order.js"></script>
</body>

</html>
