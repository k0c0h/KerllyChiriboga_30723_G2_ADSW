<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Gestión de Promociones</h2>
        <button class="btn btn-bocatto" id="btnNuevaPromocion">
            <i class="bi bi-plus-circle"></i>
            Nueva Promoción
        </button>
    </div>

    <div class="row g-4" id="contenedorPromociones"></div>

</div>

<!-- Modal Promoción -->
<div class="modal fade" id="modalPromocion">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Promoción</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formPromocion">
                    <input type="hidden" id="promocionId">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input id="promocionNombre" class="form-control" placeholder="Ej: 2x1 en bebidas">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="promocionDescripcion" class="form-control" rows="3" placeholder="Descripción de la promoción"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descuento (%)</label>
                        <input type="number" id="promocionDescuento" class="form-control" min="0" max="100" placeholder="0">
                    </div>

                    <div class="form-check form-switch mb-2">
                        <input type="checkbox" class="form-check-input" id="promocionActiva" checked>
                        <label class="form-check-label" for="promocionActiva">Activa</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="btnGuardarPromocion" class="btn btn-bocatto">Guardar</button>
            </div>
        </div>
    </div>
</div>
