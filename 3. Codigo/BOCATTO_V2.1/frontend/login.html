<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocatto - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

    <div class="login-container">
        <div class="logo-container text-center">
            <div class="logo-badge">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 18a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1v-4h10v4Z" fill="white" />
                    <path
                        d="M18 14H6c-1.5 0-3-1.5-3-3.5S5 7 7.5 7C8.5 4.5 10 3 12 3s3.5 1.5 4.5 4c2.5 0 4.5 1.5 4.5 3.5S19.5 14 18 14Z"
                        fill="white" />
                </svg>
            </div>
            <h1 class="brand-title">Bocatto</h1>
            <div class="brand-subtitle">SISTEMA DE GESTIÓN DE PEDIDOS</div>
        </div>

        <div class="login-card">
            <h2 class="card-title">Iniciar Sesión</h2>
            <div id="loginAlert" class="w-100 d-none">
            </div>

            <div id="attemptsIndicator" class="d-flex align-items-center justify-content-center gap-2 mb-3 d-none">
                <span class="dot" id="dot1"></span>
                <span class="dot" id="dot2"></span>
                <span class="dot" id="dot3"></span>
                <span class="text-muted ms-2 style-attempts-text" id="attemptsText"></span>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label-custom">Usuario</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="bi bi-person"></i></span>
                        <input id="username" class="form-input" placeholder="Ingrese su usuario" required
                            autocomplete="username">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label-custom">Contraseña</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="bi bi-lock"></i></span>
                        <input id="password" type="password" class="form-input" placeholder="Ingrese su contraseña"
                            required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" id="btnIngresar" class="btn-submit">
                    Ingresar al Sistema
                </button>
            </form>

            <div id="clientAccessContainer" class="w-100 mt-4 d-none text-center">
                <p class="text-muted small">Por seguridad, el acceso se restablece automáticamente.</p>
                <button class="btn-client-access w-100">
                    <i class="bi bi-phone me-2"></i> Acceso Cliente (sin login)
                </button>
                <p class="text-muted small mt-2">Escanee el código QR de su mesa para realizar un pedido</p>
            </div>
        </div>
    </div>

    <script type="module" src="assets/js/login.js"></script>
</body>

</html>
