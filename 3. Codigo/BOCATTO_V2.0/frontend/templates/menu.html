<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">

            Menú del Restaurante

        </h2>

        <button class="btn btn-warning" id="btnNuevoProducto">

            <i class="bi bi-plus-circle"></i>

            Nuevo Producto

        </button>

    </div>

    <div class="row mb-4">

        <div class="col-md-4">

            <input id="txtBuscarProducto" class="form-control" placeholder="Buscar producto...">

        </div>

    </div>

    <div class="row g-4" id="contenedorProductos">

    </div>

</div>

<!-- Modal -->

<div class="modal fade" id="modalProducto">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>

                    Producto

                </h5>

                <button class="btn-close" data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <form id="formProducto">

                    <input type="hidden" id="productoId">

                    <div class="mb-3">

                        <label>

                            Nombre

                        </label>

                        <input id="productoNombre" class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>

                            Descripción

                        </label>

                        <textarea id="productoDescripcion" class="form-control">

</textarea>

                    </div>

                    <div class="mb-3">

                        <label>

                            Categoría

                        </label>

                        <select id="productoCategoria" class="form-select">

                            <option>Bebidas</option>

                            <option>Entradas</option>

                            <option>Platos Fuertes</option>

                            <option>Postres</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label>

                            Precio

                        </label>

                        <input type="number" id="productoPrecio" class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>

                            Imagen (URL)</label>

                        <input id="productoImagen" class="form-control">

                    </div>

                    <div class="form-check">

                        <input type="checkbox" id="productoDisponible" class="form-check-input" checked>

                        <label class="form-check-label">

                            Disponible

                        </label>

                    </div>

                </form>

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary" data-bs-dismiss="modal">

                    Cancelar

                </button>

                <button id="btnGuardarProducto" class="btn btn-warning">

                    Guardar

                </button>

            </div>

        </div>

    </div>

</div>
