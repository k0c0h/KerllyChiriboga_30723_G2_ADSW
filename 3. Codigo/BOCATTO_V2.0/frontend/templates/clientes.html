<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">

            Gestión de Clientes

        </h2>

        <button class="btn btn-warning" id="btnNuevoCliente">

            <i class="bi bi-plus-circle"></i>

            Nuevo Cliente

        </button>

    </div>

    <div class="card shadow-sm">

        <div class="card-body">

            <div class="row mb-3">

                <div class="col-md-4">

                    <input class="form-control" id="txtBuscarCliente" placeholder="Buscar cliente">

                </div>

            </div>

            <table class="table table-hover">

                <thead class="table-dark">

                    <tr>

                        <th>Nombre</th>

                        <th>Teléfono</th>

                        <th>Correo</th>

                        <th width="170">

                            Acciones

                        </th>

                    </tr>

                </thead>

                <tbody id="tbodyClientes">

                </tbody>

            </table>

        </div>

    </div>

</div>

<div class="modal fade" id="modalCliente">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>

                    Cliente

                </h5>

                <button class="btn-close" data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <form id="formCliente">

                    <input type="hidden" id="clienteId">

                    <div class="mb-3">

                        <label>

                            Nombre

                        </label>

                        <input class="form-control" id="clienteNombre">

                    </div>

                    <div class="mb-3">

                        <label>

                            Teléfono

                        </label>

                        <input class="form-control" id="clienteTelefono">

                    </div>

                    <div class="mb-3">

                        <label>

                            Correo

                        </label>

                        <input class="form-control" id="clienteCorreo">

                    </div>

                </form>

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary" data-bs-dismiss="modal">

                    Cancelar

                </button>

                <button class="btn btn-warning" id="btnGuardarCliente">

                    Guardar

                </button>

            </div>

        </div>

    </div>

</div>
