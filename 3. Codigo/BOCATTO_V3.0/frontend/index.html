<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bocatto — Sistema de Gestión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/app.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Librerías de exportación global -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

</head>

<body>

    <div class="layout">

        <aside id="sidebar"></aside>

        <main class="contenido-principal">

            <div id="navbar"></div>

            <div id="contenido"></div>

        </main>

    </div>

    <!-- Modal de confirmación global (usado por Alert.js) -->
    <div class="modal fade" id="modalConfirmar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg" style="border-radius:14px; overflow:hidden;">
                <div class="modal-body text-center py-4 px-4">
                    <div style="font-size:2.2rem; margin-bottom:10px;">⚠️</div>
                    <p id="modalConfirmarMensaje" class="fw-semibold mb-0" style="color:#3d2514; font-size:0.95rem;"></p>
                </div>
                <div class="modal-footer border-0 justify-content-center gap-2 pt-0 pb-4">
                    <button id="btnConfirmarNo" type="button" class="btn btn-outline-secondary px-4">
                        Cancelar
                    </button>
                    <button id="btnConfirmarSi" type="button" class="btn btn-danger px-4 fw-bold">
                        Confirmar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://bocatto-2gaz.onrender.com/socket.io/socket.io.js"></script>    <script type="module" src="assets/js/app.js"></script>

</body>

</html>
